name: lerobot_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - matplotlib
  - tqdm
  - pyyaml
  - jupyter
  - ffmpeg=7.1.1
  - pip:
      - wandb
      - einops
      - opencv-python
      - hydra-core
      # Vision backbone upgrade (Round 1).
      - timm>=1.0.9
      - transformers>=4.45
      - peft>=0.12
      - safetensors

# This environment file defines the minimum dependencies required to run
# the PhaseQFlow project.  It intentionally excludes heavier packages such as
# PyTorch and the full LeRobot stack because those are typically installed
# system‑wide or via your existing LeRobot installation.  If you are
# creating a fresh conda environment for development, consider installing
# LeRobot separately as described in the installation guide.