# DEPRECATED: see configs/train/02_train_phase_and_flow.yaml for PACE v2 schedule
policy: phaseqflow
stage: train_latent
notes: learn discrete+continuous phase/skill latent with weak supervision
phaseqflow:
  weak_phase_supervision_mode: hybrid
  num_skills: 16
  continuous_skill_dim: 32
  use_value_guided_weight: false
losses:
  phase_consistency: 1.0
  phase_boundary_separation: 0.5
  future_predictability: 0.5
