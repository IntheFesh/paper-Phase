# STATUS: PENDING IMPLEMENTATION (placeholder only)
#
# compute_I_hat_2 (PolicyVarianceEstimator) raises NotImplementedError.
# This config cannot produce real results until I^(2) is implemented.
#
# Current behavior: pcar_input_signal="variance" is wired but
# PolicyVarianceEstimator.estimate() is not called anywhere in
