# ============================================================
# STATUS: PARTIAL IMPLEMENTATION (dry_run placeholder)
#
# Concordance C_t requires all three estimators (I^1, I^2, I^3).
# I^(2) and I^(3) are NotImplementedError → C_t falls back to
# beta_t alone, making this config nearly identical to 02_cliff_via_beta_only.
#
# The pcar_input_signal="concordance" path in PCARTrigger currently
# receives beta_t when concordance is unavailable.
#
# DO NOT cite numbers from this config as "full concordance" results.
# Target: re-enable in v2.1 after all three estimators are implemented.
# ============================================================

# Ablation 5: Full concordance cliff detection (complete method, no boundary reweight).
#
# All three cliff estimators (I^(1), I^(2), I^(3)) are computed and fused
# via rank-based concordance C_t.  PCAR is triggered by C_t.
# Boundary-aware flow loss reweighting is disabled in this ablation to
# isolate the contribution of concordance from that of boundary reweighting.
# Compare with ablation 07 which adds boundary reweighting on top.

policy: phaseqflow
stage: train_phase_and_flow
ablation_id: "05_cliff_concordance"
ablation_description: "Concordance (I1+I2+I3 fusion) — complete method sans boundary reweight"

phaseqflow:
  use_phase_boundary_posterior: true    # enables I^(1) via PhasePosteriorEstimator
  use_pcar: true
  pcar_input_signal: "concordance"      # rank-based C_t fusion of I^(1/2/3)

  use_chunk_infonce: true
  use_pace_a: false
  use_boundary_reweight: false          # boundary reweight disabled here; see 07

  phase_mode: "hierarchical"
  fsq_levels_macro: [5, 4]
  fsq_levels_micro: [6, 5]

  use_iql_verifier: false
  use_correction_head: false
  use_bid_sampling: false
  use_pace_c: false
  use_pace_b: false

  pcar_change_threshold: 0.4
  pcar_trigger_budget_eps: 0.1

  _status: "partial_i_hat_1_only"
