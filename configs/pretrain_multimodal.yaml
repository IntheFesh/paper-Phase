# DEPRECATED: see configs/train/01_pretrain_multimodal.yaml for PACE v2 schedule
policy: phaseqflow
stage: pretrain_multimodal
notes: train tokenizer/cross-attention with frozen vision backbone
phaseqflow:
  freeze_vision_encoder: true
  use_vision_adapter: true
  weak_phase_supervision_mode: latent
  use_value_guided_weight: false
  flow_steps: 1
  dit_num_layers: 2
losses:
  vision_state_contrastive: 1.0
  masked_modeling: 0.5
  future_token_prediction: 0.5
